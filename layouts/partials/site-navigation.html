<nav class="pv3 ph3 ph4-ns" role="navigation">
  <div class="flex justify-between items-center center">
    <a href="{{ .Site.BaseURL }}" class="f3 fw5 hover-white no-underline white-90 dib">
      {{ .Site.Title }}
    </a>
    <button class="nav-toggle bg-transparent bn white-90 f3 pointer pa2" aria-label="Toggle menu" onclick="var m=document.getElementById('nav-menu');m.classList.toggle('nav-open');">
      &#9776;
    </button>
    <div id="nav-menu" class="nav-menu">
      {{ partial "i18nlist.html" . }}
      {{ if .Site.Menus.main }}
        <ul class="pl0 mr3 list">
          {{ range .Site.Menus.main }}
          <li class="nav-item f5 f4-ns fw4 pr3">
            <a class="hover-white no-underline white-90" href="{{ .URL }}" title="{{ .Name }} page">
              {{ .Name }}
            </a>
          </li>
          {{ end }}
        </ul>
      {{ end }}
      {{ partial "social-follow.html" . }}
    </div>
  </div>
</nav>
